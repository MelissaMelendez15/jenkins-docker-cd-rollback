services:
  app_blue:
    build: ./app
    environment:
      - APP_VERSION=1.0.0
      - PORT=3000

  app_green:
    build: ./app
    environment:
      - APP_VERSION=2.0.0
      - PORT=3000
      - HEALTH_FAIL=true

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/upstream.conf:/etc/nginx/conf.d/upstream.conf
    depends_on:
      - app_blue
      - app_green

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    restart: unless-stopped

  agent_docker:
    build:
      context: .
      dockerfile: jenkins/agent/Dockerfile
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=agent-docker
      - JENKINS_SECRET=f821f660253a1a8303d09dbf60d63253c47ec9158933ca8ab7f4255119304125
    group_add:
      - "125"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/vant/Documentos/jenkins-docker-cd-rollback:/home/jenkins/agent/workspace/cd-bluegreen-rollback
    depends_on:
      - jenkins
    restart: unless-stopped

volumes:
  jenkins_home:

  