services:
  app_blue:
    build: ./app
    environment:
      - APP_VERSION=1.0.0
      - PORT=3000
  app_green: 
    build: ./app
    environment:
      - APP_VERSION=2.0.0
      - PORT=3000
      - HEALTH_FAIL=true
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/upstream.conf:/etc/nginx/conf.d/upstream.conf
    depends_on:
      - app_blue
      - app_green
  
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    restart: unless-stopped
  
  agent_docker:
    build:
      context: .
      dockerfile: jenkins/agent/Dockerfile
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=agent-docker
      - JENKINS_SECRET=4ad2f945f778e7dc61a0152ad95493013346651979b1d0cb0447e2b41836ff3a
    group_add:
      - "125"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - jenkins
    restart: unless-stopped
  
volumes:
  jenkins_home: